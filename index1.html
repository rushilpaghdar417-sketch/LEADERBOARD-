<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 Tournament</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #020617, #000);
  color:white;
}

/* ===== HEADER ===== */
.header {
  text-align:center;
  padding:20px;
  font-size:28px;
  font-weight:bold;
  color:#00f5ff;
  text-shadow:0 0 20px #00f5ff;
}

/* ===== CARD ===== */
.container {
  width:95%;
  max-width:1100px;
  margin:auto;
}

.card {
  background: rgba(255,255,255,0.05);
  border-radius:18px;
  padding:20px;
  margin-top:20px;
  box-shadow:0 0 30px rgba(0,255,255,0.2);
  backdrop-filter: blur(10px);
}

/* ===== TABLE ===== */
table {
  width:100%;
  border-collapse:collapse;
}

th {
  background:#020617;
  color:#00f5ff;
  padding:14px;
  font-size:14px;
}

td {
  padding:12px;
  border-bottom:1px solid rgba(255,255,255,0.1);
  text-align:center;
}

/* ===== INPUT CELLS ===== */
td[contenteditable="true"] {
  background:rgba(255,255,255,0.05);
  border-radius:6px;
}

/* ===== TOP 3 EFFECT ===== */
.gold {
  color:gold;
  text-shadow:0 0 10px gold;
}

.silver {
  color:silver;
}

.bronze {
  color:#cd7f32;
}

/* ===== ANIMATION ===== */
@keyframes glow {
  0% { text-shadow:0 0 5px #00f5ff; }
  50% { text-shadow:0 0 20px #00f5ff; }
  100% { text-shadow:0 0 5px #00f5ff; }
}

.header {
  animation: glow 2s infinite;
}

/* ===== FOOTER ===== */
.footer {
  text-align:center;
  margin:20px;
  color:gray;
  font-size:12px;
}
</style>
</head>

<body>

<div class="header">🔥 IRIS 2K26 LIVE LEADERBOARD 🔥</div>

<div class="container">
<div class="card">

<table id="leaderboard">
<thead>
<tr>
<th>#</th>
<th>Team</th>
<th>M1 Kills</th>
<th>M1 Rank</th>
<th>M2 Kills</th>
<th>M2 Rank</th>
<th>Total Points</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td>Team Alpha</td>
<td contenteditable="true">5</td>
<td contenteditable="true">2</td>
<td contenteditable="true">3</td>
<td contenteditable="true">4</td>
<td></td>
</tr>

<tr>
<td>2</td>
<td>Team Bravo</td>
<td contenteditable="true">2</td>
<td contenteditable="true">1</td>
<td contenteditable="true">4</td>
<td contenteditable="true">3</td>
<td></td>
</tr>

<tr>
<td>3</td>
<td>Team Cobra</td>
<td contenteditable="true">6</td>
<td contenteditable="true">5</td>
<td contenteditable="true">2</td>
<td contenteditable="true">2</td>
<td></td>
</tr>

</tbody>
</table>

</div>
</div>

<div class="footer">Designed for Free Fire Tournament</div>

<script>
function getPlacementPoints(rank){
const map = [0,12,9,8,7,6,5,4,3,2,1];
return map[rank] || 0;
}

function calculate(){
let rows = document.querySelectorAll("#leaderboard tbody tr");

let data = [];

rows.forEach(row => {

let m1Kills = parseInt(row.cells[2].innerText) || 0;
let m1Rank = parseInt(row.cells[3].innerText) || 0;

let m2Kills = parseInt(row.cells[4].innerText) || 0;
let m2Rank = parseInt(row.cells[5].innerText) || 0;

let total =
getPlacementPoints(m1Rank) + m1Kills +
getPlacementPoints(m2Rank) + m2Kills;

row.cells[6].innerText = total;

data.push({row, total});
});

// SORT DESC
data.sort((a,b)=>b.total - a.total);

// REORDER + RANK UPDATE
data.forEach((item,index)=>{
item.row.cells[0].innerText = index + 1;

// remove old classes
item.row.classList.remove("gold","silver","bronze");

// assign new classes
if(index === 0) item.row.classList.add("gold");
if(index === 1) item.row.classList.add("silver");
if(index === 2) item.row.classList.add("bronze");

document.querySelector("#leaderboard tbody").appendChild(item.row);
});

}

// LIVE UPDATE
setInterval(calculate,1000);
</script>

</body>
</html>
