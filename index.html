<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — FREE FIRE MAX League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#ff6b00;
  --secondary:#ff9500;
  --accent:#00ff88;
  --bg:#050508;
  --panel:#0d0d14;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  margin:30px 0;
}
.header h1{
  font-family:'Orbitron';
  font-size:64px;
  letter-spacing:10px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header h2{
  font-family:'Orbitron';
  font-size:14px;
  color:var(--accent);
  letter-spacing:6px;
}

/* STATUS */
.status{
  text-align:center;
  margin-bottom:20px;
  font-family:'Orbitron';
  font-size:13px;
}
.dot{
  width:8px;height:8px;
  background:var(--accent);
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(0,255,136,.6);}
  100%{box-shadow:0 0 0 10px rgba(0,255,136,0);}
}

/* BOARD */
.board{
  max-width:1000px;
  margin:auto;
  background:var(--panel);
  border-top:3px solid var(--primary);
  border-bottom:3px solid var(--primary);
}

/* TABLE FIXED ALIGNMENT */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  padding:14px;
  text-align:center;
}

th{
  font-family:'Orbitron';
  font-size:12px;
  color:var(--secondary);
  letter-spacing:2px;
}

td:nth-child(2), th:nth-child(2){
  text-align:left;
}

/* COLUMN WIDTH FIX */
th:nth-child(1),td:nth-child(1){width:70px;}
th:nth-child(2),td:nth-child(2){width:45%;}
th:nth-child(3),td:nth-child(3){width:15%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:15%;}

/* ROW */
tr{
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:.2s;
}
tr:hover{
  background:rgba(255,107,0,.1);
}

/* RANK */
.rank{
  font-family:'Orbitron';
  font-weight:900;
}

/* TOP 3 */
.rank-1{background:rgba(255,215,0,.08);}
.rank-2{background:rgba(200,200,200,.05);}
.rank-3{background:rgba(205,127,50,.05);}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{
  width:36px;height:36px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  color:var(--primary);
  border:1px solid rgba(255,107,0,.3);
}

/* NUMBERS ALIGN FIX */
td:nth-child(3),
td:nth-child(4),
td:nth-child(5){
  font-variant-numeric:tabular-nums;
}

/* TOTAL */
.points{
  font-family:'Orbitron';
  font-size:20px;
  color:var(--secondary);
}

/* MOBILE */
@media(max-width:768px){
  th,td{padding:10px 6px;font-size:14px;}
  .header h1{font-size:40px;}
}
</style>
</head>

<body>

<div class="header">
  <h1>IRIS 2K26</h1>
  <h2>FREE FIRE MAX LEAGUE STANDING</h2>
</div>

<div class="status">
  <span class="dot"></span>
  <span id="status">CONNECTING...</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM SQUAD</th>
  <th>PLACEMENT</th>
  <th>KILLS</th>
  <th>TOTAL</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="5">ANALYSING...</td></tr>
</tbody>
</table>
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";
async function loadData(){
  try{
    const res = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(URL));
    const text = await res.text();

    const rows = text.split("\n").slice(1);

    let data = rows.map(r=>{
      const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);

      return{
        name:(c[1]||"TEAM").replace(/"/g,""),
        place:Number(c[2])||0,
        kills:Number(c[3])||0,
        total:Number(c[4])||0
      };
    });

    data.sort((a,b)=>b.total-a.total);

    render(data);

    document.getElementById("status").innerText =
      "LIVE • "+new Date().toLocaleTimeString();

  }catch(e){
    document.getElementById("status").innerText="ERROR LOADING DATA";
  }
}

function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  data.forEach((t,i)=>{
    const tr = document.createElement("tr");

    const rank=i+1;
    if(rank<=3) tr.classList.add("rank-"+rank);

    const initials = t.name.split(" ").map(w=>w[0]).join("").slice(0,2);

    tr.innerHTML=`
      <td class="rank">${rank}</td>
      <td>
        <div class="team">
          <div class="logo">${initials}</div>
          ${t.name}
        </div>
      </td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points">${t.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData,30000);

</script>

</body>
</html>
