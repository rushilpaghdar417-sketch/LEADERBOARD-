<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ff6b00;
  --secondary: #ff9500;
  --accent: #00ff88;
  --bg-dark: #050508;
  --bg-panel: #0d0d14;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-dark);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

/* E-Sports Scanline Overlay */
body::after {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
  background-size: 100% 4px;
  pointer-events: none;
  z-index: 100;
  opacity: 0.4;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background:
    linear-gradient(90deg, rgba(255,107,0,0.04) 1px, transparent 1px),
    linear-gradient(rgba(255,107,0,0.04) 1px, transparent 1px);
  background-size: 80px 80px;
  pointer-events: none;
  z-index: 0;
}

/* Glow orbs */
.glow-orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(100px);
  pointer-events: none;
  z-index: 0;
}
.glow-orb.orange {
  width: 500px; height: 500px;
  background: rgba(255, 107, 0, 0.12);
  top: -150px; right: -150px;
  animation: float 8s ease-in-out infinite;
}
.glow-orb.blue {
  width: 400px; height: 400px;
  background: rgba(0, 200, 255, 0.08);
  bottom: -100px; left: -100px;
  animation: float 10s ease-in-out infinite reverse;
}

@keyframes float {
  0%, 100% { transform: translate(0,0); }
  50% { transform: translate(30px,30px); }
}

/* Container */
.container {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 40px 20px 80px;
}

/* HEADER - CENTERED & AGGRESSIVE */
.header {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  margin-bottom: 30px;
  position: relative;
}

.logo-wrapper {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  padding: 10px 40px;
}

/* Edgy background behind title */
.logo-wrapper::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,107,0,0.1), transparent);
  clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0% 50%);
  z-index: -1;
}

.header h1 {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(48px, 8vw, 84px);
  font-weight: 900;
  letter-spacing: 12px;
  margin-right: -12px; /* Compensate for letter spacing to keep perfect center */
  background: linear-gradient(180deg, #ffffff 0%, #ffcc00 50%, #ff6b00 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: 0 10px 30px rgba(255,107,0,0.5);
  text-transform: uppercase;
}

.header h2 {
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  color: var(--accent);
  margin-top: 5px;
  letter-spacing: 8px;
  margin-right: -8px;
  font-weight: 700;
  text-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
}

/* STATUS BAR */
.status-bar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  margin-bottom: 40px;
  background: rgba(255, 255, 255, 0.03);
  padding: 10px 30px;
  border-radius: 30px;
  border: 1px solid rgba(255, 255, 255, 0.05);
  width: max-content;
  margin-left: auto;
  margin-right: auto;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 14px;
  color: #9ca3af;
  letter-spacing: 2px;
  font-family: 'Orbitron', sans-serif;
}

.live-dot {
  width: 10px; height: 10px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse 1.5s infinite;
  box-shadow: 0 0 15px var(--accent);
}

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.7); }
  70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
  100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
}

/* BOARD - SHARP E-SPORTS EDGES */
.board {
  background: var(--bg-panel);
  position: relative;
  /* Slanted corners */
  clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  border-top: 4px solid var(--primary);
  border-bottom: 4px solid var(--primary);
  box-shadow: 0 20px 50px rgba(0,0,0,0.8);
}

.board::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  border: 1px solid rgba(255,107,0,0.2);
  clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
  pointer-events: none;
}

/* Table header bar */
.table-header {
  background: rgba(255, 107, 0, 0.1);
  border-bottom: 1px solid rgba(255,107,0,0.3);
  padding: 5px 15px;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
}

th {
  padding: 18px 16px;
  font-size: 13px;
  letter-spacing: 3px;
  text-align: left;
  color: var(--secondary);
  font-weight: 700;
  font-family: 'Orbitron', sans-serif;
}

th:not(:first-child) {
  text-align: center;
}

/* ROWS */
tbody tr {
  border-bottom: 1px solid rgba(255,255,255,0.03);
  transition: all 0.2s ease;
  position: relative;
  animation: slideIn 0.5s ease backwards;
}

/* Staggered entrance animation for rows */
tbody tr:nth-child(1) { animation-delay: 0.1s; }
tbody tr:nth-child(2) { animation-delay: 0.2s; }
tbody tr:nth-child(3) { animation-delay: 0.3s; }
tbody tr:nth-child(4) { animation-delay: 0.4s; }
tbody tr:nth-child(5) { animation-delay: 0.5s; }

@keyframes slideIn {
  from { opacity: 0; transform: translateX(-20px); }
  to { opacity: 1; transform: translateX(0); }
}

tbody tr:hover {
  background: linear-gradient(90deg, rgba(255,107,0,0.15), transparent);
}

/* Glowing left border on hover */
tbody tr::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--primary);
  transform: scaleY(0);
  transition: transform 0.2s ease;
}
tbody tr:hover::before {
  transform: scaleY(1);
}

td {
  padding: 16px 16px;
  font-size: 18px;
  font-weight: 600;
  vertical-align: middle;
}

td:not(:first-child):not(:nth-child(2)) {
  text-align: center;
  font-size: 20px;
  color: #e5e7eb;
}

/* RANK BADGES */
.rank-badge {
  width: 44px;
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-weight: 900;
  font-size: 18px;
  clip-path: polygon(25% 0%, 100% 0%, 75% 100%, 0% 100%); /* Parallelogram */
  position: relative;
  transform: skewX(-5deg);
}

.rank-badge span {
  transform: skewX(5deg); /* Counter-skew the number */
}

/* Top 3 special badges */
.rank-1 .rank-badge {
  background: linear-gradient(135deg, #ffd700, #ff8c00);
  color: #000;
  box-shadow: 0 0 15px rgba(255,215,0,0.6);
}
.rank-2 .rank-badge {
  background: linear-gradient(135deg, #e2e2e2, #787878);
  color: #000;
}
.rank-3 .rank-badge {
  background: linear-gradient(135deg, #ff9d5c, #8a4000);
  color: #fff;
}

/* Other ranks */
.rank-badge.default {
  background: rgba(255,255,255,0.05);
  border-left: 2px solid rgba(255,255,255,0.2);
  border-right: 2px solid rgba(255,255,255,0.2);
  color: #9ca3af;
}

/* TEAM NAME */
.team-cell {
  display: flex;
  align-items: center;
  gap: 20px;
}

.team-logo {
  width: 46px;
  height: 46px;
  background: linear-gradient(135deg, #1f1f2e, #0a0a0f);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Orbitron', sans-serif;
  font-size: 16px;
  font-weight: 900;
  color: var(--primary);
  border: 1px solid rgba(255,107,0,0.3);
  clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%); /* Slanted E-sports logo box */
  box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
}

.team-name {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: #fff;
  text-transform: uppercase;
}

/* Top 3 row highlights */
.rank-1 { background: linear-gradient(90deg, rgba(255,215,0,0.08), transparent); }
.rank-2 { background: linear-gradient(90deg, rgba(192,192,192,0.05), transparent); }
.rank-3 { background: linear-gradient(90deg, rgba(205,127,50,0.05), transparent); }

/* Points styling */
.points-total {
  font-family: 'Orbitron', sans-serif;
  font-size: 26px !important;
  font-weight: 900;
  color: var(--secondary) !important;
  text-shadow: 0 0 15px rgba(255,107,0,0.5);
}

/* Footer */
.footer {
  text-align: center;
  margin-top: 50px;
  padding: 20px;
  color: #4b5563;
  font-size: 13px;
  letter-spacing: 4px;
  font-family: 'Orbitron', sans-serif;
}

/* Responsive */
@media(max-width:768px) {
  .container { padding: 20px 10px; }
  .header h1 { letter-spacing: 6px; margin-right: -6px; }
  th, td { padding: 12px 10px; }
  .team-name { font-size: 16px; }
  .rank-badge { width: 36px; height: 36px; font-size: 14px; }
  .team-logo { width: 36px; height: 36px; font-size: 12px; }
  td:not(:first-child):not(:nth-child(2)) { font-size: 16px; }
  .points-total { font-size: 18px !important; }
}

@media(max-width:600px) {
  th:nth-child(3), td:nth-child(3),
  th:nth-child(4), td:nth-child(4) {
    display: none;
  }
}

/* Loading animation */
.loading {
  text-align: center;
  padding: 80px;
  color: var(--primary);
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 2px;
}
.loading::after {
  content: '';
  display: block;
  width: 40px;
  height: 40px;
  border: 3px solid transparent;
  border-top-color: var(--primary);
  border-bottom-color: var(--accent);
  border-radius: 50%;
  animation: spin 1s ease-in-out infinite;
  margin: 20px auto 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

</style>
</head>

<body>

<div class="glow-orb orange"></div>
<div class="glow-orb blue"></div>

<div class="container">

  <header class="header">
    <div class="logo-wrapper">
      <h1>IRIS 2K26</h1>
      <h2>LEAGUE STANDING</h2>
    </div>
  </header>

  <div class="status-bar">
    <div class="status-item">
      <span class="live-dot"></span>
      <span>LIVE TRACKING</span>
    </div>
    <div class="status-item" id="status">SYNCING DATA...</div>
  </div>

  <div class="board">
    <div class="table-header">
      <table>
        <thead>
          <tr>
            <th style="width:80px;">RANK</th>
            <th style="text-align:left;">TEAM SQUAD</th>
            <th>PLACEMENT</th>
            <th>KILLS</th>
            <th>TOTAL PTS</th>
          </tr>
        </thead>
      </table>
    </div>
    <table>
      <tbody id="tbody">
        <tr><td colspan="5" class="loading">INITIALIZING SYSTEM</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="footer">
    IRIS ESPORTS LEAGUE © 2026
  </footer>

</div>

<script>
// Fixed URLs (Removed accidental markdown formatting)
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

async function loadData() {
  try {
    const proxy = "https://corsproxy.io/?";
    const res = await fetch(proxy + encodeURIComponent(SHEET_URL));
    const csv = await res.text();

    const rows = csv.trim().split("\n").slice(1);

    const teams = rows
      .map(r => {
        const c = r.split(",");
        return {
          rank: Number(c[0]),
          name: (c[1] || "").replace(/"/g,'').toUpperCase(),
          place: Number(c[2]),
          kills: Number(c[3]),
          total: Number(c[4])
        };
      })
      .filter(t => t.name);

    render(teams);

    const now = new Date();
    document.getElementById("status").innerText =
      `LAST SYNC: ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;

  } catch(e) {
    document.getElementById("status").innerText = "CONNECTION LOST";
    console.error(e);
  }
}

function render(data) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(t => {
    const tr = document.createElement("tr");
    if(t.rank <= 3) tr.classList.add(`rank-${t.rank}`);

    const initials = t.name.substring(0,2);
    const badgeClass = t.rank <= 3 ? '' : 'default';

    tr.innerHTML = `
      <td>
        <div class="rank-badge ${badgeClass}"><span>${t.rank}</span></div>
      </td>
      <td>
        <div class="team-cell">
          <div class="team-logo">${initials}</div>
          <span class="team-name">${t.name}</span>
        </div>
      </td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points-total">${t.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

// Initial load and refresh every 60 seconds
loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
