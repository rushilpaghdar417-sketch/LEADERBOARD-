<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary: #ff6b00;
  --secondary: #ff9500;
  --accent: #00ff88;
  --bg-dark: #050508;
  --bg-panel: #0d0d14;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Rajdhani',sans-serif;
  background:var(--bg-dark);
  color:#fff;
}

/* Background Effects */
body::after {
  content:'';
  position:fixed; inset:0;
  background:linear-gradient(rgba(0,0,0,0) 50%, rgba(0,0,0,.25) 50%);
  background-size:100% 4px;
  pointer-events:none;
  opacity:.3;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background:
    linear-gradient(90deg, rgba(255,107,0,0.05) 1px, transparent 1px),
    linear-gradient(rgba(255,107,0,0.05) 1px, transparent 1px);
  background-size:80px 80px;
}

.container {
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

/* HEADER */
.header {
  text-align:center;
  margin-bottom:30px;
}

.header h1 {
  font-family:'Orbitron';
  font-size:64px;
  letter-spacing:10px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.header h2 {
  font-family:'Orbitron';
  font-size:14px;
  letter-spacing:6px;
  color:var(--accent);
}

/* STATUS */
.status-bar {
  text-align:center;
  margin-bottom:30px;
}

.live-dot {
  display:inline-block;
  width:8px;height:8px;
  background:var(--accent);
  border-radius:50%;
  margin-right:8px;
  animation:pulse 1.2s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 0 0 rgba(0,255,136,.6);}
  100% { box-shadow:0 0 0 10px rgba(0,255,136,0);}
}

/* BOARD */
.board {
  background:var(--bg-panel);
  border-top:3px solid var(--primary);
  border-bottom:3px solid var(--primary);
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
}

th {
  padding:14px;
  color:var(--secondary);
  font-family:'Orbitron';
  font-size:12px;
  letter-spacing:2px;
}

td {
  padding:14px;
  text-align:center;
}

td:nth-child(2) { text-align:left; }

tr {
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:.2s;
}

tr:hover {
  background:rgba(255,107,0,.1);
}

/* Rank */
.rank {
  font-family:'Orbitron';
  font-weight:bold;
}

/* Top 3 */
.rank-1 { background:rgba(255,215,0,.08);}
.rank-2 { background:rgba(200,200,200,.05);}
.rank-3 { background:rgba(205,127,50,.05);}

.points {
  font-family:'Orbitron';
  font-size:20px;
  color:var(--secondary);
}

/* Loading */
.loading {
  text-align:center;
  padding:50px;
  color:var(--primary);
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>IRIS 2K26</h1>
  <h2>LEAGUE STANDING</h2>
</div>

<div class="status-bar">
  <span class="live-dot"></span>
  <span id="status">CONNECTING...</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM</th>
  <th>PLACEMENT</th>
  <th>KILLS</th>
  <th>TOTAL</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="5" class="loading">LOADING DATA...</td></tr>
</tbody>
</table>
</div>

</div>

<script>

const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

async function loadData() {
  try {
    const res = await fetch("https://api.allorigins.win/raw?url=" + encodeURIComponent(SHEET_URL));
    const csv = await res.text();

    const data = parseCSV(csv);

    if(!data.length) throw "No data";

    render(data);

    document.getElementById("status").innerText =
      "LIVE • " + new Date().toLocaleTimeString();

  } catch (err) {
    document.getElementById("status").innerText = "ERROR LOADING DATA";
    console.error(err);
  }
}

/* Better CSV Parser */
function parseCSV(str) {
  const rows = str.split("\n").slice(1);

  return rows.map(row => {
    const cols = row.match(/(".*?"|[^",]+)(?=\s*,|\s*$)/g);

    if(!cols) return null;

    return {
      rank: Number(cols[0]) || 0,
      name: (cols[1] || "").replace(/"/g,"").trim(),
      place: Number(cols[2]) || 0,
      kills: Number(cols[3]) || 0,
      total: Number(cols[4]) || 0
    };
  }).filter(Boolean);
}

function render(data) {
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.sort((a,b)=>b.total - a.total);

  data.forEach((t,i)=>{
    const tr = document.createElement("tr");

    const rank = i+1;

    if(rank <= 3) tr.classList.add(`rank-${rank}`);

    tr.innerHTML = `
      <td class="rank">${rank}</td>
      <td>${t.name}</td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points">${t.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
