<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#ff6b00;
  --secondary:#ff9500;
  --accent:#00ff88;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Rajdhani',sans-serif;
  color:#fff;
  min-height:100vh;

  background:
    linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)),
    url("https://raw.githubusercontent.com/rushilpaghdar417-sketch/LEADERBOARD-/39b63340f4503d780e7949d72f7a1ea69b2e2423/Ultra_wide_cinematic_background_for_202604302053.jpeg.png");

  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}
/* header */
.header{
  text-align:center;
  margin-bottom:25px;
}
.header h1{
  font-family:'Orbitron';
  font-size:48px;
  letter-spacing:6px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header h2{
  font-family:'Orbitron';
  color:var(--accent);
  letter-spacing:5px;
  font-size:13px;
}

/* status */
.status{
  text-align:center;
  margin-bottom:20px;
  font-family:'Orbitron';
  font-size:13px;
}
.dot{
  width:8px;height:8px;
  background:var(--accent);
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
  box-shadow:0 0 10px var(--accent);
}

/* 💎 GLASS BOARD */
.board{
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(22px) saturate(180%);
  -webkit-backdrop-filter: blur(22px) saturate(180%);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.25);

  box-shadow:
    0 20px 60px rgba(0,0,0,0.6),
    inset 0 0 25px rgba(255,255,255,0.08);

  overflow:hidden;
  position:relative;
}

/* glass reflection */
.board::after{
  content:"";
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:40%;

  background:linear-gradient(
    to bottom,
    rgba(255,255,255,0.25),
    rgba(255,255,255,0.05),
    transparent
  );
}

/* table */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  padding:12px;
  text-align:center;
}

th{
  font-family:'Orbitron';
  color:var(--secondary);
  font-size:11px;
}

td:nth-child(2),th:nth-child(2){
  text-align:left;
}

/* widths */
th:nth-child(1),td:nth-child(1){width:60px;}
th:nth-child(2),td:nth-child(2){width:45%;}
th:nth-child(3),td:nth-child(3){width:15%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:15%;}

/* rows */
tr{
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:0.2s;
}
tr:hover{
  background:rgba(255,255,255,0.08);
}

/* rank */
.rank-box{
  width:42px;
  height:34px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  font-weight:900;
  clip-path:polygon(20% 0,100% 0,80% 100%,0% 100%);
}

.rank-1 .rank-box{
  background:linear-gradient(#ffd700,#ff8c00);
  color:#000;
}
.rank-2 .rank-box{
  background:linear-gradient(#ddd,#777);
  color:#000;
}
.rank-3 .rank-box{
  background:linear-gradient(#ff9d5c,#8a4000);
}

.rank-box.default{
  background:rgba(255,255,255,0.15);
}

/* team */
.team{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{
  width:30px;height:30px;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  color:var(--primary);
}

/* points */
.points{
  font-family:'Orbitron';
  color:var(--secondary);
}

/* footer */
.footer{
  text-align:center;
  padding:15px;
  font-family:'Orbitron';
  font-size:11px;
  color:#aaa;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>VADMED PRESENTS IRIS 2K26</h1>
  <h2>LEAGUE STANDING</h2>
</div>

<div class="status">
  <span class="dot"></span>
  <span id="status">LIVE</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM</th>
  <th>PLACE</th>
  <th>KILLS</th>
  <th>PTS</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="5">LOADING...</td></tr>
</tbody>
</table>
</div>

</div>

<div class="footer">
  IRIS ESPORTS LEAGUE © 2026
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

async function loadData(){
  const res = await fetch(SHEET_URL + "&t=" + Date.now());
  const csv = await res.text();

  const rows = csv.trim().split("\n").slice(1);

  let data = rows.map(r=>{
    const c = r.split(",");
    return {
      name:c[1] || "TEAM",
      place:Number(c[2])||0,
      kills:Number(c[3])||0,
      total:Number(c[4])||0
    };
  });

  data.sort((a,b)=>b.total-a.total);

  render(data);

  document.getElementById("status").innerText =
    "LIVE • "+new Date().toLocaleTimeString();
}

function render(data){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";

  data.forEach((t,i)=>{
    const tr=document.createElement("tr");
    const rank=i+1;

    if(rank<=3) tr.classList.add("rank-"+rank);

    tr.innerHTML=`
      <td><div class="rank-box ${rank<=3?'':'default'}">${rank}</div></td>
      <td><div class="team"><div class="logo">${t.name.substring(0,2)}</div>${t.name}</div></td>
      <td>${t.place || "—"}</td>
      <td>${t.kills || "—"}</td>
      <td class="points">${t.total || "—"}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData,2000);
</script>

</body>
</html>
