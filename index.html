<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#ff6b00;
  --secondary:#ff9500;
  --accent:#00ff88;
  --bg:#050508;
  --panel:#0d0d14;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Rajdhani';
  background:var(--bg);
  color:#fff;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* CONTAINER */
.container{
  flex:1;
  max-width:1100px;
  margin:auto;
  padding:30px 15px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:25px;
}
.header h1{
  font-family:'Orbitron';
  font-size:60px;
  letter-spacing:10px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header h2{
  font-family:'Orbitron';
  color:var(--accent);
  letter-spacing:6px;
  font-size:14px;
}

/* STATUS */
.status{
  text-align:center;
  margin-bottom:20px;
  font-family:'Orbitron';
  font-size:13px;
}
.dot{
  width:8px;height:8px;
  background:var(--accent);
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
}

/* BOARD */
.board{
  background:var(--panel);
  border-top:3px solid var(--primary);
  border-bottom:3px solid var(--primary);
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  padding:14px;
  text-align:center;
}

th{
  font-family:'Orbitron';
  color:var(--secondary);
  font-size:12px;
}

td:nth-child(2),th:nth-child(2){
  text-align:left;
}

/* WIDTH FIX */
th:nth-child(1),td:nth-child(1){width:70px;}
th:nth-child(2),td:nth-child(2){width:45%;}
th:nth-child(3),td:nth-child(3){width:15%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:15%;}

/* ROW */
tr{
  border-bottom:1px solid rgba(255,255,255,.05);
}

/* 🔥 RANK BADGE (MATCH REFERENCE STYLE) */
.rank-box{
  width:48px;
  height:38px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  font-weight:900;
  clip-path:polygon(20% 0,100% 0,80% 100%,0% 100%);
}

/* TOP 3 */
.rank-1 .rank-box{
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  color:#000;
}
.rank-2 .rank-box{
  background:linear-gradient(135deg,#ddd,#777);
  color:#000;
}
.rank-3 .rank-box{
  background:linear-gradient(135deg,#ff9d5c,#8a4000);
}

/* OTHER */
.rank-box.default{
  background:#1a1a22;
  color:#888;
}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:10px;
}

.logo{
  width:34px;height:34px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  color:var(--primary);
  border:1px solid rgba(255,107,0,.3);
}

/* POINTS */
.points{
  font-family:'Orbitron';
  font-size:20px;
  color:var(--secondary);
}

/* FOOTER (FIXED CENTER BOTTOM) */
.footer{
  text-align:center;
  padding:15px 0;
  font-family:'Orbitron';
  font-size:12px;
  letter-spacing:3px;
  color:#555;
}

/* MOBILE */
@media(max-width:768px){
  .header h1{font-size:40px;}
  th,td{padding:10px 6px;font-size:13px;}
}
</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>IRIS 2K26</h1>
  <h2>LEAGUE STANDING</h2>
</div>

<div class="status">
  <span class="dot"></span>
  <span id="status">LIVE</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM SQUAD</th>
  <th>PLACEMENT</th>
  <th>KILLS</th>
  <th>TOTAL PTS</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="5">LOADING...</td></tr>
</tbody>
</table>
</div>

</div>

<!-- 🔥 PERFECT FOOTER -->
<div class="footer">
  IRIS ESPORTS LEAGUE © 2026
</div>

<script>

const URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

async function loadData(){
  const res = await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(URL));
  const text = await res.text();

  const rows = text.split("\n").slice(1);

  let data = rows.map(r=>{
    const c = r.split(",");
    return{
      name:(c[1]||"TEAM"),
      place:Number(c[2])||0,
      kills:Number(c[3])||0,
      total:Number(c[4])||0
    };
  });

  data.sort((a,b)=>b.total-a.total);

  render(data);
}

function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  data.forEach((t,i)=>{
    const tr=document.createElement("tr");

    const rank=i+1;
    if(rank<=3) tr.classList.add("rank-"+rank);

    const initials=t.name.substring(0,2);

    tr.innerHTML=`
      <td>
        <div class="rank-box ${rank<=3?'':'default'}">${rank}</div>
      </td>
      <td>
        <div class="team">
          <div class="logo">${initials}</div>
          ${t.name}
        </div>
      </td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points">${t.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();

</script>

</body>
</html>
