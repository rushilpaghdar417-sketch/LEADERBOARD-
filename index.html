<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap)" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Rajdhani',sans-serif;
  background:#0a0a0f;
  color:#fff;
  min-height:100vh;
  overflow-x:hidden;
}

/* Animated background grid */
body::before{
  content:'';
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:
    linear-gradient(90deg, rgba(255,107,0,0.03) 1px, transparent 1px),
    linear-gradient(rgba(255,107,0,0.03) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
  z-index:0;
}

/* Glow orbs */
.glow-orb{
  position:fixed;
  border-radius:50%;
  filter:blur(80px);
  pointer-events:none;
  z-index:0;
}
.glow-orb.orange{
  width:400px;height:400px;
  background:rgba(255,107,0,0.15);
  top:-100px;right:-100px;
  animation:float 8s ease-in-out infinite;
}
.glow-orb.blue{
  width:300px;height:300px;
  background:rgba(0,200,255,0.1);
  bottom:-50px;left:-50px;
  animation:float 10s ease-in-out infinite reverse;
}

@keyframes float{
  0%,100%{transform:translate(0,0);}
  50%{transform:translate(30px,30px);}
}

/* Container */
.container{
  position:relative;
  z-index:1;
  max-width:1200px;
  margin:0 auto;
  padding:30px 20px 60px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:40px;
}

.logo-wrapper{
  display:inline-block;
  position:relative;
}

.header h1{
  font-family:'Orbitron',sans-serif;
  font-size:clamp(42px,8vw,72px);
  font-weight:900;
  letter-spacing:8px;
  background:linear-gradient(135deg,#ff6b00,#ff9500,#ffcc00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:0 0 60px rgba(255,107,0,0.4);
  position:relative;
}

.header h1::after{
  content:'';
  position:absolute;
  bottom:-10px;
  left:50%;
  transform:translateX(-50%);
  width:60%;
  height:3px;
  background:linear-gradient(90deg,transparent,#ff6b00,transparent);
}

.header h2{
  font-size:14px;
  color:#6b7280;
  margin-top:20px;
  letter-spacing:6px;
  font-weight:500;
}

/* STATUS BAR */
.status-bar{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.status-item{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:12px;
  color:#6b7280;
  letter-spacing:1px;
}

.live-dot{
  width:8px;height:8px;
  background:#00ff88;
  border-radius:50%;
  animation:pulse 2s infinite;
  box-shadow:0 0 10px #00ff88;
}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1);}
  50%{opacity:0.5;transform:scale(1.2);}
}

/* BOARD */
.board{
  background:linear-gradient(145deg,#12121a,#0d0d12);
  border-radius:16px;
  overflow:hidden;
  border:1px solid rgba(255,107,0,0.2);
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.03),
    0 20px 50px rgba(0,0,0,0.5),
    0 0 100px rgba(255,107,0,0.1);
}

/* Table header bar */
.table-header{
  background:linear-gradient(90deg,rgba(255,107,0,0.15),rgba(255,107,0,0.05));
  border-bottom:1px solid rgba(255,107,0,0.3);
  padding:0 10px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  padding:18px 16px;
  font-size:11px;
  letter-spacing:2px;
  text-align:left;
  color:#ff9500;
  font-weight:600;
  text-transform:uppercase;
}

th:not(:first-child){
  text-align:center;
}

/* ROWS */
tbody tr{
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:all 0.3s ease;
}

tbody tr:hover{
  background:linear-gradient(90deg,rgba(255,107,0,0.1),transparent);
  transform:scale(1.005);
}

td{
  padding:20px 16px;
  font-size:16px;
  font-weight:500;
  vertical-align:middle;
}

td:not(:first-child):not(:nth-child(2)){
  text-align:center;
  font-weight:600;
  font-size:18px;
  color:#e5e7eb;
}

/* RANK BADGES */
.rank-badge{
  width:48px;
  height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-weight:700;
  font-size:16px;
  border-radius:8px;
  position:relative;
}

/* Top 3 special badges */
.rank-1 .rank-badge{
  background:linear-gradient(135deg,#ffd700,#ff9500);
  color:#000;
  box-shadow:0 0 25px rgba(255,215,0,0.5);
}
.rank-2 .rank-badge{
  background:linear-gradient(135deg,#c0c0c0,#8a8a8a);
  color:#000;
  box-shadow:0 0 20px rgba(192,192,192,0.4);
}
.rank-3 .rank-badge{
  background:linear-gradient(135deg,#cd7f32,#a0522d);
  color:#000;
  box-shadow:0 0 20px rgba(205,127,50,0.4);
}

/* Other ranks */
.rank-badge.default{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  color:#9ca3af;
}

/* TEAM NAME */
.team-cell{
  display:flex;
  align-items:center;
  gap:16px;
}

.team-logo{
  width:40px;
  height:40px;
  background:linear-gradient(135deg,#1f1f2e,#15151f);
  border-radius:8px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron',sans-serif;
  font-size:14px;
  font-weight:700;
  color:#ff6b00;
  border:1px solid rgba(255,107,0,0.2);
}

.team-name{
  font-size:18px;
  font-weight:700;
  letter-spacing:1px;
  color:#fff;
}

/* Top 3 row highlights */
.rank-1{
  background:linear-gradient(90deg,rgba(255,215,0,0.08),transparent);
}
.rank-2{
  background:linear-gradient(90deg,rgba(192,192,192,0.06),transparent);
}
.rank-3{
  background:linear-gradient(90deg,rgba(205,127,50,0.06),transparent);
}

/* Points styling */
.points-total{
  font-family:'Orbitron',sans-serif;
  font-size:22px !important;
  font-weight:700;
  color:#ff9500 !important;
  text-shadow:0 0 20px rgba(255,107,0,0.4);
}

/* Footer */
.footer{
  text-align:center;
  margin-top:40px;
  padding:20px;
  color:#4b5563;
  font-size:12px;
  letter-spacing:2px;
}

/* Responsive */
@media(max-width:768px){
  th,td{padding:14px 10px;}
  .team-name{font-size:14px;}
  .rank-badge{width:38px;height:38px;font-size:14px;}
  .team-logo{width:32px;height:32px;font-size:12px;}
  td:not(:first-child):not(:nth-child(2)){font-size:14px;}
  .points-total{font-size:16px !important;}
}

@media(max-width:600px){
  th:nth-child(3),td:nth-child(3),
  th:nth-child(4),td:nth-child(4){
    display:none;
  }
}

/* Loading animation */
.loading{
  text-align:center;
  padding:60px;
  color:#6b7280;
}
.loading::after{
  content:'';
  display:inline-block;
  width:20px;
  height:20px;
  border:2px solid #ff6b00;
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 1s linear infinite;
  margin-left:10px;
  vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg);}}

</style>
</head>

<body>

<div class="glow-orb orange"></div>
<div class="glow-orb blue"></div>

<div class="container">

  <header class="header">
    <div class="logo-wrapper">
      <h1>IRIS 2K26</h1>
    </div>
    <h2>LEAGUE STANDING</h2>
  </header>

  <div class="status-bar">
    <div class="status-item">
      <span class="live-dot"></span>
      <span>LIVE</span>
    </div>
    <div class="status-item" id="status">UPDATING...</div>
  </div>

  <div class="board">
    <div class="table-header">
      <table>
        <thead>
          <tr>
            <th style="width:80px;">RANK</th>
            <th style="text-align:left;">TEAM</th>
            <th>PLACEMENT</th>
            <th>KILLS</th>
            <th>TOTAL</th>
          </tr>
        </thead>
      </table>
    </div>
    <table>
      <tbody id="tbody">
        <tr><td colspan="5" class="loading">Loading standings</td></tr>
      </tbody>
    </table>
  </div>

  <footer class="footer">
    IRIS ESPORTS LEAGUE © 2026
  </footer>

</div>

<script>

const SHEET_URL = "[docs.google.com](https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv)";

async function loadData(){
  try{
    const proxy = "[corsproxy.io](https://corsproxy.io/)";
    const res = await fetch(proxy + encodeURIComponent(SHEET_URL));
    const csv = await res.text();

    const rows = csv.trim().split("\n").slice(1);

    const teams = rows
      .map(r=>{
        const c = r.split(",");
        return {
          rank: Number(c[0]),
          name: (c[1] || "").replace(/"/g,'').toUpperCase(),
          place: Number(c[2]),
          kills: Number(c[3]),
          total: Number(c[4])
        };
      })
      .filter(t=>t.name);

    render(teams);

    const now = new Date();
    document.getElementById("status").innerText =
      `UPDATED ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}`;

  }catch(e){
    document.getElementById("status").innerText = "CONNECTION ERROR";
    console.error(e);
  }
}

function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML = "";

  data.forEach(t=>{
    const tr = document.createElement("tr");
    if(t.rank <= 3) tr.classList.add(`rank-${t.rank}`);

    const initials = t.name.substring(0,2);
    const badgeClass = t.rank <= 3 ? '' : 'default';

    tr.innerHTML = `
      <td>
        <div class="rank-badge ${badgeClass}">${t.rank}</div>
      </td>
      <td>
        <div class="team-cell">
          <div class="team-logo">${initials}</div>
          <span class="team-name">${t.name}</span>
        </div>
      </td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points-total">${t.total}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData, 60000);

</script>

</body>
</html>
