<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#ff6b00;
  --secondary:#ff9500;
  --accent:#00ff88;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Rajdhani',sans-serif;
  color:#fff;
  min-height:100vh;

  /* 🔥 YOUR DRIVE BACKGROUND */
  background: url("https://drive.google.com/file/d/1dhKnfhyuwGSLU8FpZRTluolzDkNs8vHW/view?usp=drivesdk") no-repeat center center fixed;
  background-size: cover;
}

/* 🌫️ DARK OVERLAY FOR READABILITY */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.55);
  z-index:0;
}

.container{
  position:relative;
  z-index:1;
  max-width:1100px;
  margin:auto;
  padding:30px 15px;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:25px;
}
.header h1{
  font-family:'Orbitron';
  font-size:56px;
  letter-spacing:8px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header h2{
  font-family:'Orbitron';
  color:var(--accent);
  letter-spacing:6px;
  font-size:14px;
}

/* STATUS */
.status{
  text-align:center;
  margin-bottom:20px;
  font-family:'Orbitron';
}
.dot{
  width:8px;height:8px;
  background:var(--accent);
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
  box-shadow:0 0 10px var(--accent);
}

/* 💎 LIQUID GLASS BOARD */
.board{
  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px);

  border-radius:20px;
  border:1px solid rgba(255,255,255,0.2);

  box-shadow:
    0 10px 40px rgba(0,0,0,0.6),
    inset 0 0 20px rgba(255,255,255,0.05);

  overflow:hidden;
  position:relative;
}

/* ✨ GLASS EDGE GLOW */
.board::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:1px;

  background:linear-gradient(120deg,
    rgba(255,255,255,0.5),
    rgba(255,255,255,0.05),
    rgba(255,255,255,0.5)
  );

  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  padding:14px;
  text-align:center;
}

th{
  font-family:'Orbitron';
  color:var(--secondary);
  font-size:12px;
}

td:nth-child(2),th:nth-child(2){
  text-align:left;
}

/* WIDTH */
th:nth-child(1),td:nth-child(1){width:70px;}
th:nth-child(2),td:nth-child(2){width:45%;}
th:nth-child(3),td:nth-child(3){width:15%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:15%;}

/* ROW */
tr{
  border-bottom:1px solid rgba(255,255,255,0.08);
  transition:.2s;
}
tr:hover{
  background:rgba(255,255,255,0.08);
}

/* RANK */
.rank-box{
  width:46px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  font-weight:900;
  clip-path:polygon(20% 0,100% 0,80% 100%,0% 100%);
}

.rank-1 .rank-box{
  background:linear-gradient(135deg,#ffd700,#ff8c00);
  color:#000;
}
.rank-2 .rank-box{
  background:linear-gradient(#ddd,#777);
  color:#000;
}
.rank-3 .rank-box{
  background:linear-gradient(#ff9d5c,#8a4000);
}

.rank-box.default{
  background:rgba(255,255,255,0.1);
}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{
  width:34px;height:34px;
  background:rgba(255,255,255,0.1);
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  color:var(--primary);
}

/* POINTS */
.points{
  font-family:'Orbitron';
  font-size:20px;
  color:var(--secondary);
}

/* FOOTER */
.footer{
  text-align:center;
  padding:15px;
  font-family:'Orbitron';
  font-size:12px;
  letter-spacing:3px;
  color:#ccc;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
  <h1>VADMED PRESENTS IRIS 2K26</h1>
  <h2>LEAGUE STANDING</h2>
</div>

<div class="status">
  <span class="dot"></span>
  <span id="status">LIVE</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM SQUAD</th>
  <th>PLACEMENT</th>
  <th>KILLS</th>
  <th>TOTAL PTS</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="5">LOADING...</td></tr>
</tbody>
</table>
</div>

</div>

<div class="footer">
  IRIS ESPORTS LEAGUE © 2026
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

async function loadData(){
  const res = await fetch(SHEET_URL + "&t=" + Date.now());
  const csv = await res.text();

  const rows = csv.trim().split("\n").slice(1);

  let data = rows.map(r=>{
    const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    return {
      name:(c[1]||"TEAM"),
      place:Number(c[2])||0,
      kills:Number(c[3])||0,
      total:Number(c[4])||0
    };
  });

  data.sort((a,b)=>b.total-a.total);

  render(data);

  document.getElementById("status").innerText =
    "LIVE • "+new Date().toLocaleTimeString();
}

function render(data){
  const tbody = document.getElementById("tbody");
  tbody.innerHTML="";

  data.forEach((t,i)=>{
    const tr=document.createElement("tr");
    const rank=i+1;

    if(rank<=3) tr.classList.add("rank-"+rank);

    const initials=t.name.substring(0,2);

    tr.innerHTML=`
      <td><div class="rank-box ${rank<=3?'':'default'}">${rank}</div></td>
      <td><div class="team"><div class="logo">${initials}</div>${t.name}</div></td>
      <td>${t.place || "—"}</td>
      <td>${t.kills || "—"}</td>
      <td class="points">${t.total || "—"}</td>
    `;

    tbody.appendChild(tr);
  });
}

loadData();
setInterval(loadData,2000);
</script>

</body>
</html>
