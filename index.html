<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRIS 2K26 — League Standing</title>

<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#ff6b00;
  --secondary:#ff9500;
  --accent:#00ff88;
  --bg:#050508;
  --panel:#0d0d14;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Rajdhani',sans-serif;
  background:var(--bg);
  color:#fff;
}

/* HEADER */
.header{
  text-align:center;
  margin:30px 0;
}
.header h1{
  font-family:'Orbitron';
  font-size:64px;
  letter-spacing:10px;
  background:linear-gradient(#fff,#ffcc00,#ff6b00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.header h2{
  font-family:'Orbitron';
  font-size:14px;
  color:var(--accent);
  letter-spacing:6px;
}

/* STATUS */
.status{
  text-align:center;
  margin-bottom:20px;
  font-family:'Orbitron';
  font-size:13px;
}
.dot{
  width:8px;height:8px;
  background:var(--accent);
  display:inline-block;
  border-radius:50%;
  margin-right:6px;
  animation:pulse 1.2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(0,255,136,.6);}
  100%{box-shadow:0 0 0 10px rgba(0,255,136,0);}
}

/* BOARD */
.board{
  max-width:1000px;
  margin:auto;
  background:var(--panel);
  border-top:3px solid var(--primary);
  border-bottom:3px solid var(--primary);
}

/* TABLE FIXED ALIGNMENT */
table{
  width:100%;
  border-collapse:collapse;
  table-layout:fixed;
}

th,td{
  padding:14px;
  text-align:center;
}

th{
  font-family:'Orbitron';
  font-size:12px;
  color:var(--secondary);
  letter-spacing:2px;
}

td:nth-child(2), th:nth-child(2){
  text-align:left;
}

/* COLUMN WIDTH FIX */
th:nth-child(1),td:nth-child(1){width:70px;}
th:nth-child(2),td:nth-child(2){width:45%;}
th:nth-child(3),td:nth-child(3){width:15%;}
th:nth-child(4),td:nth-child(4){width:15%;}
th:nth-child(5),td:nth-child(5){width:15%;}

/* ROW */
tr{
  border-bottom:1px solid rgba(255,255,255,.05);
  transition:.2s;
}
tr:hover{
  background:rgba(255,107,0,.1);
}

/* RANK */
.rank{
  font-family:'Orbitron';
  font-weight:900;
}

/* TOP 3 */
.rank-1{background:rgba(255,215,0,.08);}
.rank-2{background:rgba(200,200,200,.05);}
.rank-3{background:rgba(205,127,50,.05);}

/* TEAM */
.team{
  display:flex;
  align-items:center;
  gap:10px;
}
.logo{
  width:36px;height:36px;
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'Orbitron';
  color:var(--primary);
  border:1px solid rgba(255,107,0,.3);
}

/* NUMBERS ALIGN FIX */
td:nth-child(3),
td:nth-child(4),
td:nth-child(5){
  font-variant-numeric:tabular-nums;
}

/* TOTAL */
.points{
  font-family:'Orbitron';
  font-size:20px;
  color:var(--secondary);
}

/* MOBILE */
@media(max-width:768px){
  th,td{padding:10px 6px;font-size:14px;}
  .header h1{font-size:40px;}
}
</style>
</head>

<body>

<div class="header">
  <h1>IRIS 2K26</h1>
  <h2>LEAGUE STANDING</h2>
</div>

<div class="status">
  <span class="dot"></span>
  <span id="status">CONNECTING...</span>
</div>

<div class="board">
<table>
<thead>
<tr>
  <th>RANK</th>
  <th>TEAM SQUAD</th>
  <th>PLACEMENT</th>
  <th>KILLS</th>
  <th>TOTAL</th>
</tr>
</thead>

<tbody id="tbody">
<tr><td colspan="5">LOADING...</td></tr>
</tbody>
</table>
</div>

<script>
const SHEET_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSsiqcYXYmtB8nLGXVP-Fkwr6DVZOehzH83ax_-U8agRM4lG-JH_oSSQClT0ENVCQgdx1LuklCjpRt7/pub?gid=322356309&single=true&output=csv";

let lastDataHash = "";

async function loadData() {
  try {
    const proxy = "https://corsproxy.io/?";
    const res = await fetch(proxy + encodeURIComponent(SHEET_URL));
    const csv = await res.text();

    // 🔥 HASH CHECK (prevents unnecessary re-render)
    const newHash = hash(csv);
    if (newHash === lastDataHash) {
      updateStatus("LIVE • NO CHANGE");
      return;
    }
    lastDataHash = newHash;

    const rows = csv.trim().split("\n").slice(1);

    const teams = rows.map(r => {
      const c = r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
      return {
        name: (c[1] || "").replace(/"/g,'').toUpperCase(),
        place: Number(c[2]) || 0,
        kills: Number(c[3]) || 0,
        total: Number(c[4]) || 0
      };
    }).filter(t => t.name);

    // 🔥 SORT + AUTO RANK
    teams.sort((a,b)=>b.total - a.total);
    teams.forEach((t,i)=> t.rank = i+1);

    renderSmooth(teams);

    updateStatus("LIVE • UPDATED");

  } catch(e) {
    updateStatus("CONNECTION LOST");
    console.error(e);
  }
}

/* 🔥 SMOOTH RENDER (NO FLICKER) */
function renderSmooth(data) {
  const tbody = document.getElementById("tbody");

  data.forEach((t, index) => {
    let row = tbody.children[index];

    if (!row) {
      row = document.createElement("tr");
      tbody.appendChild(row);
    }

    if(t.rank <= 3) row.className = `rank-${t.rank}`;
    else row.className = "";

    const initials = t.name.split(" ").map(w=>w[0]).join("").slice(0,2);

    const newHTML = `
      <td>
        <div class="rank-badge ${t.rank<=3?'':'default'}">
          <span>${t.rank}</span>
        </div>
      </td>
      <td>
        <div class="team-cell">
          <div class="team-logo">${initials}</div>
          <span class="team-name">${t.name}</span>
        </div>
      </td>
      <td>${t.place}</td>
      <td>${t.kills}</td>
      <td class="points-total">${t.total}</td>
    `;

    // 🔥 Only update if changed
    if (row.innerHTML !== newHTML) {
      row.innerHTML = newHTML;

      // 🔥 FLASH UPDATE EFFECT
      row.style.background = "rgba(0,255,136,0.15)";
      setTimeout(() => {
        row.style.background = "";
      }, 400);
    }
  });

  // Remove extra rows if needed
  while (tbody.children.length > data.length) {
    tbody.removeChild(tbody.lastChild);
  }
}

/* 🔥 STATUS UPDATE */
function updateStatus(text) {
  const el = document.getElementById("status");
  const now = new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
  el.innerText = `${text} • ${now}`;
}

/* 🔥 SIMPLE HASH FUNCTION */
function hash(str) {
  let h = 0, i, chr;
  for (i = 0; i < str.length; i++) {
    chr = str.charCodeAt(i);
    h = ((h << 5) - h) + chr;
    h |= 0;
  }
  return h;
}

/* 🔥 INITIAL LOAD */
loadData();

/* ⚡ FAST REFRESH (EVERY 5 SEC) */
setInterval(loadData, 5000);
</script>
</body>
</html>
